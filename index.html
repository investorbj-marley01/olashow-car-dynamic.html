<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OlaShow Car Dealership</title>
<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
    color:#333;
}
header{
    background:#1a73e8;
    color:white;
    padding:20px;
    text-align:center;
}
h1{margin:0;}
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.cars{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:20px;
}
.car-card{
    background:white;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
    overflow:hidden;
}
.car-card img{
    width:100%;
    display:block;
}
.car-card h3{
    margin:10px;
    color:#1a73e8;
}
.car-card p{
    margin:10px;
    font-size:14px;
}
.contact{
    margin-top:40px;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
input, textarea, button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
    box-sizing:border-box;
}
button{
    background:#1a73e8;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover{
    background:#155bb5;
}
</style>
</head>
<body>

<header>
<h1>OlaShow Car</h1>
<p>Your trusted car dealership demo website</p>
</header>

<div class="container">
<h2>Our Cars</h2>
<div class="cars" id="car-list">
<!-- Cars will load here dynamically -->
</div>

<div class="contact">
<h2>Contact Dealer</h2>
<form onsubmit="submitForm(event)">
<input type="text" placeholder="Your Name" required>
<input type="email" placeholder="Your Email" required>
<textarea placeholder="Your Message" rows="5" required></textarea>
<button type="submit">Send Message</button>
</form>
</div>
</div>

<script>
// Array of car objects
const cars = [
    {name:"Toyota Camry", price:"$15,000", year:"2018", mileage:"35,000 km", img:"https://via.placeholder.com/400x200.png?text=Toyota+Camry"},
    {name:"Honda Civic", price:"$12,500", year:"2017", mileage:"40,000 km", img:"https://via.placeholder.com/400x200.png?text=Honda+Civic"},
    {name:"BMW X5", price:"$25,000", year:"2019", mileage:"28,000 km", img:"https://via.placeholder.com/400x200.png?text=BMW+X5"},
    {name:"Mercedes C-Class", price:"$27,500", year:"2020", mileage:"22,000 km", img:"https://via.placeholder.com/400x200.png?text=Mercedes+C-Class"},
    {name:"Ford Mustang", price:"$30,000", year:"2021", mileage:"15,000 km", img:"https://via.placeholder.com/400x200.png?text=Ford+Mustang"}
];

// Load cars dynamically
const carList = document.getElementById("car-list");
cars.forEach(car => {
    const div = document.createElement("div");
    div.className = "car-card";
    div.innerHTML = `
        <img src="${car.img}" alt="${car.name}">
        <h3>${car.name}</h3>
        <p>Price: ${car.price}<br>Year: ${car.year}<br>Mileage: ${car.mileage}</p>
    `;
    carList.appendChild(div);
});

// Dummy form submit
function submitForm(event){
    event.preventDefault();
    alert("Thank you! Your message has been sent (demo).");
}
</script>

</body>
</html>
